<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 48" role="img" aria-labelledby="title">
  <title>Russia</title>
  <defs>
    <clipPath id="clip">
      <rect x="2" y="2" width="60" height="44" rx="12" ry="12"/>
    </clipPath>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.24"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="64" height="16" y="0" fill="#f8f8f8"/>
    <rect width="64" height="16" y="16" fill="#2a5fbe"/>
    <rect width="64" height="16" y="32" fill="#cf2f3d"/>
    <rect width="64" height="24" fill="url(#shine)"/>
  </g>
  <rect x="2" y="2" width="60" height="44" rx="12" ry="12" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5"/>
</svg>
